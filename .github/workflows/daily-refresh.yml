name: Daily AI News Refresh

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC every day
  workflow_dispatch:        # also allows manual "Run workflow" button on GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # allows committing updated files back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run daily refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python refresh.py

      - name: Commit and push updated files
        run: |
          git config user.name  "AI News Bot"
          git config user.email "bot@wxccdemo.com"
          git add index.html AI_Cockpit.html
          git diff --staged --quiet || git commit -m "Daily refresh: $(date +'%B %d, %Y')"
          git push
